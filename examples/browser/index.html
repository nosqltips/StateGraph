<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgentStateGraph Browser Demo</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #1a1a2e; color: #e0e0e0; }
        h1 { color: #00d4ff; }
        h2 { color: #7b68ee; margin-top: 30px; }
        pre { background: #16213e; padding: 15px; border-radius: 8px; overflow-x: auto; border: 1px solid #333; }
        .output { color: #00ff88; }
        .error { color: #ff6b6b; }
        .info { color: #ffd93d; }
        button { background: #7b68ee; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 5px; }
        button:hover { background: #6a5acd; }
        #log { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>AgentStateGraph Browser Demo</h1>
    <p>AI-native versioned state store running in your browser via WASM + IndexedDB.</p>

    <div>
        <button onclick="runDemo()">Run Full Demo</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <h2>Output</h2>
    <pre id="log"></pre>

    <script type="module">
        // NOTE: In production, import from the wasm-pack output:
        // import init, { WasmAgentStateGraph } from './pkg/agentstategraph_wasm.js';

        // For this demo, we simulate the AgentStateGraph API to show the concept.
        // Build the real WASM with: wasm-pack build crates/agentstategraph-wasm --target web

        const log = document.getElementById('log');

        function print(text, cls = 'output') {
            log.innerHTML += `<span class="${cls}">${text}</span>\n`;
            log.scrollTop = log.scrollHeight;
        }

        // IndexedDB persistence layer
        class IndexedDBPersistence {
            constructor(dbName) {
                this.dbName = dbName;
            }

            async open() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('objects')) db.createObjectStore('objects');
                        if (!db.objectStoreNames.contains('commits')) db.createObjectStore('commits');
                        if (!db.objectStoreNames.contains('refs')) db.createObjectStore('refs');
                    };
                    request.onsuccess = (e) => { this.db = e.target.result; resolve(); };
                    request.onerror = (e) => reject(e);
                });
            }

            async flushPending(sg) {
                // Get pending writes from AgentStateGraph
                const objects = JSON.parse(sg.drain_pending_objects());
                const commits = JSON.parse(sg.drain_pending_commits());
                const refs = JSON.parse(sg.drain_pending_refs());

                // Write to IndexedDB
                if (objects.length > 0) await this.batchPut('objects', objects);
                if (commits.length > 0) await this.batchPut('commits', commits);
                if (refs.length > 0) await this.batchPut('refs', refs);

                return { objects: objects.length, commits: commits.length, refs: refs.length };
            }

            async batchPut(storeName, pairs) {
                const tx = this.db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                for (const [key, value] of pairs) {
                    store.put(value, key);
                }
                return new Promise((resolve, reject) => {
                    tx.oncomplete = resolve;
                    tx.onerror = reject;
                });
            }

            async loadAll(storeName) {
                const tx = this.db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                return new Promise((resolve, reject) => {
                    const pairs = [];
                    const request = store.openCursor();
                    request.onsuccess = (e) => {
                        const cursor = e.target.result;
                        if (cursor) {
                            pairs.push([cursor.key, cursor.value]);
                            cursor.continue();
                        } else {
                            resolve(pairs);
                        }
                    };
                    request.onerror = reject;
                });
            }
        }

        window.runDemo = async function() {
            clearLog();
            print('=== AgentStateGraph Browser Demo ===', 'info');
            print('');
            print('This demonstrates AgentStateGraph running in your browser via WASM.');
            print('State persists in IndexedDB — survives page refreshes.');
            print('');

            // In production, this would use the real WASM module:
            // import init, { WasmAgentStateGraph } from './pkg/agentstategraph_wasm.js';
            // await init();
            // const sg = new WasmAgentStateGraph("my-app");

            print('--- Simulated Agent Workflow ---', 'info');
            print('');
            print('1. Agent initializes cluster state:');
            print('   sg.set("/cluster/name", "production", "Checkpoint", "init")');
            print('   sg.set("/cluster/nodes", 5, "Checkpoint", "node count")');
            print('');

            print('2. Agent creates speculations for storage approach:');
            print('   spec_nfs  = sg.speculate("main", "NFS shared storage")');
            print('   spec_ceph = sg.speculate("main", "Ceph distributed")');
            print('');

            print('3. Agent modifies each speculation independently:');
            print('   sg.spec_set(spec_nfs,  "/storage/type", "nfs")');
            print('   sg.spec_set(spec_ceph, "/storage/type", "ceph")');
            print('');

            print('4. Agent picks NFS and commits with reasoning:');
            print('   sg.commit_speculation(spec_nfs, "Refine",');
            print('     "NFS requires fewer nodes than Ceph", 0.85)');
            print('   sg.discard_speculation(spec_ceph)');
            print('');

            print('5. State persists to IndexedDB:', 'info');
            print('   const flushed = await persistence.flushPending(sg)');
            print('   // { objects: 12, commits: 3, refs: 1 }');
            print('');

            print('6. On next page load, state is restored:', 'info');
            print('   const objects = await persistence.loadAll("objects")');
            print('   sg.load_objects(JSON.stringify(objects))');
            print('   // Full state graph with history restored!');
            print('');

            print('--- Why This Matters ---', 'info');
            print('');
            print('Traditional browser apps lose state on refresh.');
            print('AgentStateGraph + IndexedDB gives you:');
            print('  ✓ Full version history in the browser');
            print('  ✓ Branch/merge for collaborative editing');
            print('  ✓ Every AI action has intent + reasoning');
            print('  ✓ Offline-capable — no server needed');
            print('  ✓ ~1MB WASM binary, instant startup');
            print('');
            print('Build the WASM module:', 'info');
            print('  cd agentstategraph && wasm-pack build crates/agentstategraph-wasm --target web');
            print('');
            print('=== Demo complete ===', 'info');
        };

        window.clearLog = function() {
            log.innerHTML = '';
        };
    </script>
</body>
</html>
